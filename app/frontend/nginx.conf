# nginx serves the built SPA and reverse-proxies API calls to the backend.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets for faster loads.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # API: strip the /api prefix and forward to the backend service.
    # "/api/health"  ->  http://backend:8000/health
    # The trailing slash on proxy_pass performs the prefix strip.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming endpoints (SSE) need buffering off and long timeouts.
        proxy_buffering     off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # SPA fallback: any non-file route returns index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
